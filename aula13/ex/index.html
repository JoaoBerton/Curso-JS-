<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios aula 13</title>
</head>
<body>
    
    <script>
        const nome = prompt("Digite seu nome completo:");
        document.body.innerHTML = `O seu nome completo é : ${nome}.`;
        document.body.innerHTML += `<br>O seu nome completo possui ${nome.length} letras.`;
        document.body.innerHTML += `<br>A segunda letra do seu nome é: ${nome.charAt(1)}`;
        document.body.innerHTML += `<br> O primeiro índice da letra do seu nome é ${nome.indexOf('o')}`;
        document.body.innerHTML += `<br>O último índice da letra do seu nome é ${nome.lastIndexOf('o')}`;
        document.body.innerHTML += `<br>As últimas 3 letras do seu nome são: ${nome.slice(-3, nome.length)}`;
        document.body.innerHTML += `<br>As palavras do seu nome são ${nome.split(' ')}`;
        document.body.innerHTML += `<br>Seu nome com letras maiúsculas ${nome.toUpperCase()}`;
        document.body.innerHTML += `<br>Seu nome com letras minúsculas ${nome.toLowerCase()}`;
    </script>
</body>
</html>
